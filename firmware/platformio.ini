[platformio]
; only build/flash the V2 env by default; use `pio run -e panel_s3 -t upload`
; for the stock ESP32-S3 Feather (or change default_envs to panel_s3)
default_envs = panel

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions.csv
extra_scripts =
    pre:autorev.py
lib_deps =
    zinggjm/GxEPD2
    adafruit/Adafruit MAX1704X
    h2zero/NimBLE-Arduino

; ESP32 Feather V2 (HUZZAH32 V2): remapped pins, battery via A13 divider
[env:panel]
board = adafruit_feather_esp32_v2
build_flags =
    '-D PARTIAL_REFRESH'
#	'-D INVERT_PULSE_CLEANUP'
	'-D FULL_REFRESH_INTERVAL_MIN=15'
#	'-D GABEN_STARTUP'
    '-D EPD_EN=(14)'
    '-D EPD_BUSY=(32)'
    '-D EPD_RESET=(15)'
    '-D SRAM_CS=(33)'
    '-D EPD_DC=(27)'
    '-D EPD_CS=(13)'

; Stock ESP32-S3 Feather: original BOM pins, MAX17048 fuel gauge
; build/flash with: pio run -e panel_s3 -t upload
[env:panel_s3]
board = adafruit_feather_esp32s3
build_flags =
    '-D PARTIAL_REFRESH'
#	'-D INVERT_PULSE_CLEANUP'
	'-D FULL_REFRESH_INTERVAL_MIN=15'
#	'-D GABEN_STARTUP'
    '-D USE_MAX17048'
    '-D EPD_EN=(6)'
    '-D EPD_BUSY=(9)'
    '-D EPD_RESET=(10)'
    '-D SRAM_CS=(11)'
    '-D EPD_DC=(12)'
    '-D EPD_CS=(13)'

; optional flags for either env:
;   '-D FULL_REFRESH_INTERVAL_MIN=15'  cleanup cadence in minutes (default 30)
;   '-D INVERT_PULSE_CLEANUP'          quieter invert-pulse cleanup
;   '-D GABEN_STARTUP'                 boot splash (requires gaben.h)
;   '-D STARTUP_DELAY_MS=5000'         delay initial startup for debugging
;	Note: GABEN_STARTUP is disabled by default, may cause ghosting between boot and the first screen refresh when enabled
